<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Welcome | AISECT Live Bus Tracker</title>

    <link rel="stylesheet" href="css/welcome.css">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="welcome-container">

    <div class="welcome-card">

        <div class="logo">
            🚌
        </div>

        <h1>AISECT Live Bus Tracker</h1>

        <h2>🙏 आपकी यात्रा शुभ हो 🙏</h2>

        <p>
            Welcome Driver! Start your trip and share your live location with students.
        </p>

        <div class="bus-select">

            <label>Select Bus</label>

            <select id="busSelect">

                <option value="bus1">🚌 Bus 1</option>
                <option value="bus2">🚌 Bus 2</option>
                <option value="bus3">🚌 Bus 3</option>

            </select>

        </div>

        <button id="startTrip">

            <i class="fa-solid fa-location-arrow"></i>

            Start Trip

        </button>

    </div>

</div>

    <script src="js/welcome.js"></script>

</body>

</html>
